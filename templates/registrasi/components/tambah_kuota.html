{% load humanize %}
{% block head %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/2.0.4/htmx.min.js" integrity="sha512-2kIcAizYXhIn8TzUvqzEDZNuDZ+aW7yE/+f1HJHXFjQcGNfv1kqzJSTBRBSlOgp6B/KZsz1K0a3ZTqP9dnxioQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
    .keterangan { width: 235px; padding-top:5px }
</style>
{% endblock %}

<div>
  <div class="fs-6 fw-bold mt-3">Perhitungan Penambahan Kuota</div>
  <form action="{% url 'tambah_kuota' %}?id={{ kode_toko }}" method="POST">
    {% csrf_token %}
    <div class="d-flex justify-content-center">
      <label for="jumlah_kuota" class="keterangan">Jumlah Kuota: </label>
      <select name="jumlah_kuota" required class="form-select" id="jumlah_kuota"
              hx-get="{% url 'hitung_biaya_kuota' %}" hx-trigger="change" hx-target="#biaya">
        <option value="">----------</option>
        {% for kuota in list_kuota %}
        <option value="{{ kuota }}">{{ kuota }} transaksi</option>
        {% endfor %}
      </select>
    </div>
    <div class="d-flex justify-content-start my-2">
      <div style="min-width:193px;max-width:193px;padding-top:5px;">Kode Voucher:</div>
      <div class="w-100">
        <input placeholder="kode voucher (opsional)" class="form-control" type="text" name="voucher"
               hx-get="{% url 'request_kode_voucher' %}?tipe=add&toko={{ kode_toko }}"
               hx-trigger="keyup" hx-target="#validasi_voucher">
      </div>
    </div>
    <div id="validasi_voucher" class="text-end"></div>
    <div id="biaya" class="mt-4"></div>

    {% if wallet and wallet > 0 %}
    <div class="alert alert-info d-flex align-items-center gap-3 mt-3 py-2">
      <i class="fa fa-wallet fs-5 text-primary"></i>
      <div class="flex-fill">
        <div class="fw-bold" style="font-size:13px;">Saldo Wallet: <span class="text-success">Rp {{ wallet|intcomma }}</span></div>
        <div style="font-size:12px;color:#555;">Wallet dapat digunakan sebagai potongan pembayaran.</div>
      </div>
      <div class="form-check mb-0">
        <input class="form-check-input" type="checkbox" name="gunakan_wallet" id="gw_kuota" value="on">
        <label class="form-check-label fw-bold" for="gw_kuota" style="font-size:13px;">Gunakan Wallet</label>
      </div>
    </div>
    {% endif %}

    <div class="mt-4">
      Apakah akan di proses?
      <button class="btn btn-sm btn-success">ya, saya proses.</button>
      <a class="btn btn-sm btn-warning" href="{{ asal }}#tambahkuota">tidak, batalkan dulu.</a>
    </div>
  </form>
</div>
