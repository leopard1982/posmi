{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password — POSMI</title>
  <link rel="icon" type="image/x-icon" href="{% static 'images/posmi.ico' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Poppins', sans-serif; background: #f7f9fc; display: flex; align-items: center; justify-content: center; }
    .card-box {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 40px rgba(44,62,107,.1);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo img { height: 48px; border-radius: 8px; }
    h1 { font-size: 1.3rem; font-weight: 800; color: #1e2c5a; margin-bottom: 6px; }
    p.sub { color: #8899bb; font-size: 13px; line-height: 1.6; margin-bottom: 24px; }
    label { font-size: 12px; font-weight: 600; color: #2c3e6b; margin-bottom: 6px; display: block; }
    .form-control-custom {
      width: 100%; border: 1.5px solid #dce4f0; border-radius: 8px;
      padding: 12px 14px; font-size: 13px; font-family: 'Poppins', sans-serif;
      background: #fff; outline: none; transition: border-color .2s, box-shadow .2s;
    }
    .form-control-custom:focus { border-color: #3a5298; box-shadow: 0 0 0 3px rgba(58,82,152,.1); }
    .btn-submit {
      width: 100%; background: #2c3e6b; color: #fff; border: none;
      border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 700;
      font-family: 'Poppins', sans-serif; cursor: pointer; margin-top: 18px;
      transition: opacity .2s;
    }
    .btn-submit:hover { opacity: .85; }
    .alert-box { border-radius: 8px; padding: 11px 14px; font-size: 13px; margin-bottom: 18px; }
    .alert-success { background: #e8f5e9; color: #2e7d32; }
    .alert-error   { background: #fdecea; color: #c62828; }
    .back { text-align: center; margin-top: 20px; }
    .back a { font-size: 12px; color: #8899bb; text-decoration: none; }
    .back a:hover { color: #2c3e6b; }
  </style>
</head>
<body>
  <div class="card-box">
    <div class="logo">
      <img src="{% static 'images/posmi-logo.png' %}" alt="POSMI">
    </div>

    <h1>Lupa Password?</h1>
    <p class="sub">Masukkan email akun Anda. Kami akan mengirimkan tautan untuk mereset password yang berlaku selama <strong>1 jam</strong>.</p>

    {% if messages %}
      {% for message in messages %}
        <div class="alert-box {% if 'berhasil' in message|lower or 'dikirim' in message|lower %}alert-success{% else %}alert-error{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label>Alamat Email</label>
        <input type="email" name="email" class="form-control-custom" placeholder="email@toko.com" required autofocus>
      </div>
      <button type="submit" class="btn-submit">Kirim Tautan Reset</button>
    </form>

    <div class="back">
      <a href="/login/">&#8592; Kembali ke halaman masuk</a>
    </div>
  </div>
</body>
</html>
