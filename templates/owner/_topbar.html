{% load static %}
<nav class="navbar navbar-light bg-white topbar static-top shadow-sm px-4"
     style="min-height:64px;border-bottom:1px solid #e8eef8;display:flex;align-items:center;justify-content:space-between;">

  <!-- Kiri: Sidebar toggle (mobile) + Tanggal -->
  <div class="d-flex align-items-center gap-3">
    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle p-0">
      <i class="fa fa-bars" style="color:#1e2c5a;font-size:16px;"></i>
    </button>
    <span style="font-size:13px;color:#8899bb;font-weight:600;">{% now "d F Y" %}</span>
  </div>

  <!-- Kanan: User info + dropdown -->
  <div class="dropdown">
    <a href="#" class="d-flex align-items-center gap-3 text-decoration-none dropdown-toggle"
       id="ownerTopbarDropdown" data-bs-toggle="dropdown" aria-expanded="false"
       style="list-style:none;">
      <div style="text-align:right;">
        <div style="font-size:13px;font-weight:800;color:#1e2c5a;line-height:1.3;">{{ owner.nama }}</div>
        <div style="font-size:11px;color:#8899bb;line-height:1.3;">Paket Korporasi</div>
      </div>
      <div style="width:40px;height:40px;background:#1e2c5a;border-radius:50%;
                  display:flex;align-items:center;justify-content:center;
                  flex-shrink:0;box-shadow:0 2px 8px rgba(30,44,90,.25);">
        <i class="fa fa-building" style="color:#fff;font-size:15px;"></i>
      </div>
    </a>
    <div class="dropdown-menu dropdown-menu-end shadow"
         style="border:none;border-radius:12px;overflow:hidden;min-width:210px;">
      <div style="padding:14px 16px;background:#f8fafc;border-bottom:1px solid #eef1f6;">
        <div style="font-weight:800;font-size:13px;color:#1e2c5a;">{{ owner.nama }}</div>
        <div style="font-size:11px;color:#8899bb;">{{ owner.user.email }}</div>
      </div>
      <a href="{% url 'owner_dashboard' %}" class="dropdown-item py-2" style="font-size:13px;">
        <i class="fa fa-th-large me-2" style="color:#4e73df;width:16px;"></i>Dashboard
      </a>
      <a href="{% url 'owner_klaim_toko' %}" class="dropdown-item py-2" style="font-size:13px;">
        <i class="fa fa-plus-circle me-2" style="color:#059669;width:16px;"></i>Tambah Toko
      </a>
      <div class="dropdown-divider my-0"></div>
      <a href="{% url 'logoutkan' %}" class="dropdown-item py-2 text-danger" style="font-size:13px;">
        <i class="fa fa-sign-out me-2" style="width:16px;"></i>Logout
      </a>
    </div>
  </div>

</nav>
