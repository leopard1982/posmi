<div class="row g-3">
  <div class="col-12 col-md-6">
    <label class="form-label fw-bold">Nama Paket <span class="text-danger">*</span></label>
    <input type="text" name="nama" class="form-control" required placeholder="cth: Bisnis Kecil">
  </div>
  <div class="col-6 col-md-3">
    <label class="form-label fw-bold">Maks Transaksi/Bulan</label>
    <input type="number" name="max_transaksi" class="form-control" min="0" value="0">
  </div>
  <div class="col-6 col-md-3">
    <label class="form-label fw-bold">Maks User Login</label>
    <input type="number" name="max_user_login" class="form-control" min="0" value="0">
  </div>
  <div class="col-12"><hr class="my-1"><small class="text-muted fw-bold">Harga Berlangganan (Rp)</small></div>
  <div class="col-6 col-md-4">
    <label class="form-label">Per Bulan</label>
    <input type="number" name="harga_per_bulan" class="form-control" min="0" value="0">
  </div>
  <div class="col-6 col-md-4">
    <label class="form-label">Per 3 Bulan</label>
    <input type="number" name="harga_per_tiga_bulan" class="form-control" min="0" value="0">
  </div>
  <div class="col-6 col-md-4">
    <label class="form-label">Per 6 Bulan</label>
    <input type="number" name="harga_per_enam_bulan" class="form-control" min="0" value="0">
  </div>
  <div class="col-6 col-md-4">
    <label class="form-label">Per Tahun</label>
    <input type="number" name="harga_per_tahun" class="form-control" min="0" value="0">
  </div>
  <div class="col-6 col-md-4">
    <label class="form-label">Per 2 Tahun</label>
    <input type="number" name="harga_per_dua_tahun" class="form-control" min="0" value="0">
  </div>
  <div class="col-6 col-md-4">
    <label class="form-label">Diskon (%)</label>
    <input type="number" name="disc" class="form-control" min="0" max="100" value="0">
  </div>
  <div class="col-12"><hr class="my-1"><small class="text-muted fw-bold">Fitur Paket</small></div>
  <div class="col-12 col-md-4">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" name="is_ceklist_barang" id="{{ prefix }}chk_ceklist">
      <label class="form-check-label" for="{{ prefix }}chk_ceklist">
        <i class="fas fa-list-check me-1 text-primary"></i> Ceklist barang sebelum payment
      </label>
    </div>
  </div>
  <div class="col-12 col-md-4">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" name="is_pembayaran_tempo" id="{{ prefix }}chk_tempo">
      <label class="form-check-label" for="{{ prefix }}chk_tempo">
        <i class="fas fa-clock me-1 text-warning"></i> Pembayaran tempo (kredit)
      </label>
    </div>
  </div>
  <div class="col-12 col-md-4">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" name="is_add_ons" id="{{ prefix }}chk_addons">
      <label class="form-check-label" for="{{ prefix }}chk_addons">
        <i class="fas fa-puzzle-piece me-1 text-success"></i> Penambahan add-ons
      </label>
    </div>
  </div>
</div>
